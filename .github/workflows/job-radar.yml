name: Job Fit Radar

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      NOTIFIER: ntfy
      NTFY_SERVER: https://ntfy.sh
      NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
      DASHBOARD_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
      DATABASE_PATH: jobs.db

      # Keep rules first. Later change AI_PROVIDER repository variable to gemini.
      AI_PROVIDER: ${{ vars.AI_PROVIDER || 'rules' }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          python -m playwright install --with-deps chromium

      - name: Write profile.md from GitHub Secret
        run: |
          cat > profile.md <<'EOF'
          ${{ secrets.PROFILE_MD }}
          EOF

      - name: Run cloud scan
        run: |
          python -u cloud_runner.py

      - name: Commit dashboard and cloud state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/index.html cloud_state.json

          if git diff --cached --quiet; then
            echo "No dashboard/state changes to commit."
          else
            git commit -m "Update job radar dashboard"
            git push
          fi
